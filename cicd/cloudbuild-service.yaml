steps:
  - name: gcr.io/cloud-builders/docker
    id: pull-app-cache
    entrypoint: bash
    args:
      - -lc
      - |
        docker pull "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO_APP}/${_IMAGE_NAME}:latest" || true

  - name: gcr.io/cloud-builders/docker
    id: build-app-image
    args:
      - build
      - --file=cicd/docker/Dockerfile.service
      - --cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO_APP}/${_IMAGE_NAME}:latest
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO_APP}/${_IMAGE_NAME}:${SHORT_SHA}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO_APP}/${_IMAGE_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-app-image-sha
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO_APP}/${_IMAGE_NAME}:${SHORT_SHA}

  - name: gcr.io/cloud-builders/docker
    id: push-app-image-latest
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO_APP}/${_IMAGE_NAME}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-to-cloud-run
    entrypoint: bash
    args:
      - -lc
      - |
        set -euo pipefail

        app_image_uri="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO_APP}/${_IMAGE_NAME}:${SHORT_SHA}"

        gcloud run deploy "${_SERVICE_NAME}" \
          --project "${PROJECT_ID}" \
          --region "${_REGION}" \
          --platform managed \
          --image "${app_image_uri}" \
          --port "${_PORT}" \
          --cpu "${_CPU}" \
          --memory "${_MEMORY}" \
          --min-instances="${_MIN_INSTANCES}" \
          --max-instances="${_MAX_INSTANCES}" \
          --timeout="${_TIMEOUT}" \
          --ingress="${_CLOUD_RUN_INGRESS}" \
          --allow-unauthenticated \
          --service-account "${_RUNTIME_SERVICE_ACCOUNT_EMAIL}"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: reconcile-cloud-run-ingress
    entrypoint: bash
    args:
      - -lc
      - |
        set -euo pipefail
        GCLOUD_PROJECT_ID="${_PROJECT_ID}" GCLOUD_REGION="${_REGION}" GCLOUD_SERVICE_NAME="${_GCLOUD_SERVICE_NAME}" WEBSITE_HOSTNAME="${_WEBSITE_HOSTNAME}" \
          bash cicd/reconcile-service-ingress.sh --env "${_SERVICE_ENV}"

substitutions:
  _ARTIFACT_REPO_APP: xlentors-dev-app
  _CLOUD_RUN_INGRESS: all
  _CPU: "1"
  _GCLOUD_SERVICE_NAME: xlentors-dev
  _IMAGE_NAME: xlentors-dev
  _MAX_INSTANCES: "3"
  _MEMORY: 512Mi
  _MIN_INSTANCES: "0"
  _PORT: "8080"
  _PROJECT_ID: xlentors-dev
  _REGION: us-central1
  _RUNTIME_SERVICE_ACCOUNT_EMAIL: xlentors-dev-deploy@xlentors-dev.iam.gserviceaccount.com
  _SERVICE_ENV: prod
  _SERVICE_NAME: xlentors-dev
  _TIMEOUT: 60s
  _WEBSITE_HOSTNAME: xlentors.dev

timeout: 3600s

options:
  logging: CLOUD_LOGGING_ONLY
